<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRIME (Heather Christian)</title>

  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#111;
      color:#fff;
      font-family:Arial, sans-serif;
    }

    .container{
      width:min(90vw,480px);
      display:grid;
      gap:16px;
      text-align:center;
    }

    h1{
      margin:0;
      font-size:1.6rem;
    }

    label{
      font-size:.95rem;
    }

    input, button{
      font-size:1rem;
      padding:12px;
      border-radius:8px;
      border:none;
    }

    input{
      background:#222;
      color:#fff;
    }

    button{
      background:#fff;
      color:#111;
      font-weight:bold;
      cursor:pointer;
    }

    button:disabled{
      opacity:.6;
      cursor:default;
    }

    .primary{
      background:#fff;
      color:#111;
    }

    .secondary{
      background:#2a2a2a;
      color:#fff;
      border:1px solid #444;
    }

    .startNow{
      font-size:1.15rem;
      padding:16px;
    }

    .status{
      min-height:1.4em;
      color:#bbb;
    }

    .countdown{
      min-height:1.4em;
      font-size:1.2rem;
      font-weight:bold;
    }

    .progressWrap{
      width:100%;
      display:grid;
      gap:8px;
    }

    .progressLabel{
      font-size:.92rem;
      color:#bbb;
      min-height:1.2em;
    }

    .debug{
      font-size:.82rem;
      color:#888;
      min-height:1.2em;
      word-break:break-word;
    }

    progress{
      width:100%;
      height:14px;
      appearance:none;
    }

    progress::-webkit-progress-bar{
      background:#222;
      border-radius:999px;
    }

    progress::-webkit-progress-value{
      background:#fff;
      border-radius:999px;
    }

    progress::-moz-progress-bar{
      background:#fff;
      border-radius:999px;
    }

    audio{
      width:100%;
    }

    .hidden{
      display:none;
    }

    input[type="datetime-local"]{
      color:#fff;
      background:#222;
    }

    input[type="datetime-local"]::-webkit-datetime-edit{
      color:#fff;
    }

    input[type="datetime-local"]::-webkit-calendar-picker-indicator{
      filter:invert(1);
    }
  </style>
</head>

<body>
  <main class="container">
    <h1>PRIME (Heather Christian)</h1>

    <label for="startTime">Start Time (tap to set)</label>
    <input id="startTime" type="datetime-local" step="1" placeholder="Tap to choose start time" />

    <button id="playButton" class="primary">Load / Prepare</button>

    <button id="startNowButton" class="primary startNow hidden">Start Now</button>

    <div id="countdown" class="countdown"></div>
    <div id="status" class="status">Ready.</div>

    <div class="progressWrap">
      <div id="progressLabel" class="progressLabel">Download not started.</div>
      <progress id="progressBar" value="0" max="1"></progress>
    </div>

    <div id="debug" class="debug"></div>

    <audio
      id="audio"
      preload="none"
      playsinline
      crossorigin="anonymous"
      class="hidden">
    </audio>
  </main>

  <script>
    const AUDIO_URL = "https://audio.eggtooth.xyz/prime.mp3";

    const audio = document.getElementById("audio");
    const playButton = document.getElementById("playButton");
    const startNowButton = document.getElementById("startNowButton");
    const startInput = document.getElementById("startTime");
    const statusEl = document.getElementById("status");
    const countdownEl = document.getElementById("countdown");
    const progressBar = document.getElementById("progressBar");
    const progressLabel = document.getElementById("progressLabel");
    const debugEl = document.getElementById("debug");

    let countdownTimer = null;
    let countdownInterval = null;
    let driftInterval = null;

    let scheduledAnchorMs = null;
    let isSoftCorrecting = false;
    let sourceAssigned = false;
    let preparationStarted = false;
    let autoStartAttempted = false;
    let waitingForManualStart = false;
    let playbackHasBegun = false;

    const DRIFT_CHECK_MS = 5000;
    const DRIFT_THRESHOLD_SEC = 1.5;
    const DRIFT_RECOVER_SEC = 0.35;
    const SOFT_RATE_FAST = 1.03;
    const SOFT_RATE_SLOW = 0.97;
    const NORMAL_RATE = 1.0;
    const START_BUFFER_SEC = 2;

    function setStatus(msg){
      statusEl.textContent = msg;
    }

    function setCountdown(msg){
      countdownEl.textContent = msg;
    }

    function setProgressLabel(msg){
      progressLabel.textContent = msg;
    }

    function setDebug(msg){
      debugEl.textContent = msg || "";
    }

    function showPlayer(){
      audio.classList.remove("hidden");
      audio.controls = true;
    }

    function hidePlayer(){
      audio.classList.add("hidden");
      audio.controls = false;
    }

    function showStartNow(){
      startNowButton.classList.remove("hidden");
    }

    function hideStartNow(){
      startNowButton.classList.add("hidden");
    }

    function clearTimers(){
      if(countdownInterval){
        clearInterval(countdownInterval);
        countdownInterval = null;
      }
      if(countdownTimer){
        clearTimeout(countdownTimer);
        countdownTimer = null;
      }
    }

    function clearDriftMonitor(){
      if(driftInterval){
        clearInterval(driftInterval);
        driftInterval = null;
      }
    }

    function resetPlaybackRate(){
      audio.playbackRate = NORMAL_RATE;
      isSoftCorrecting = false;
    }

    function assignSourceIfNeeded(){
      if(sourceAssigned) return;
      audio.src = AUDIO_URL;
      sourceAssigned = true;
    }

    function formatCountdown(ms){
      const s = Math.ceil(ms / 1000);
      const m = Math.floor(s / 60);
      const sec = s % 60;
      return `${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
    }

    function formatTrackTime(sec){
      sec = Math.max(0, Math.floor(sec));
      const m = Math.floor(sec / 60);
      const s = sec % 60;
      return `${m}:${String(s).padStart(2, "0")}`;
    }

    function formatPercent(value){
      return `${Math.round(value * 100)}%`;
    }

    async function ensureMetadata(timeoutMs = 30000){
      assignSourceIfNeeded();

      if(audio.readyState >= 1 && isFinite(audio.duration) && audio.duration > 0){
        return true;
      }

      return new Promise((resolve, reject)=>{
        const timeout = setTimeout(()=>{
          cleanup();
          reject(new Error("Metadata timeout"));
        }, timeoutMs);

        function onLoaded(){
          cleanup();
          resolve(true);
        }

        function onError(){
          cleanup();
          reject(new Error("Audio load error"));
        }

        function cleanup(){
          clearTimeout(timeout);
          audio.removeEventListener("loadedmetadata", onLoaded);
          audio.removeEventListener("error", onError);
        }

        audio.addEventListener("loadedmetadata", onLoaded);
        audio.addEventListener("error", onError);
        audio.load();
      });
    }

    function waitForSeek(){
      return new Promise(resolve=>{
        if(!audio.seeking){
          resolve();
          return;
        }
        audio.addEventListener("seeked", resolve, { once:true });
      });
    }

    function startDownload(){
      assignSourceIfNeeded();
      audio.preload = "auto";
      audio.load();
      setProgressLabel("Downloading / buffering…");
    }

    function updateDownloadProgress(){
      try{
        if(!audio.duration || !isFinite(audio.duration) || audio.buffered.length === 0){
          return;
        }

        const bufferedEnd = audio.buffered.end(audio.buffered.length - 1);
        const ratio = Math.max(0, Math.min(1, bufferedEnd / audio.duration));
        progressBar.value = ratio;
        setProgressLabel(
          `Buffered: ${formatPercent(ratio)} (${formatTrackTime(bufferedEnd)} of ${formatTrackTime(audio.duration)})`
        );
      }catch(err){
        // silent
      }
    }

    function hasBufferedThrough(targetTimeSec){
      try{
        if(audio.buffered.length === 0) return false;

        for(let i = 0; i < audio.buffered.length; i++){
          const start = audio.buffered.start(i);
          const end = audio.buffered.end(i);

          if(targetTimeSec >= start && targetTimeSec <= end - 0.25){
            return true;
          }
        }

        return false;
      }catch(err){
        return false;
      }
    }

    function hasEnoughToStartAt(offsetSec){
      if(!audio.duration || !isFinite(audio.duration)) return false;
      return hasBufferedThrough(offsetSec + START_BUFFER_SEC);
    }

    function getExpectedTrackTimeSec(){
      if(scheduledAnchorMs == null) return null;
      return Math.max(0, (Date.now() - scheduledAnchorMs) / 1000);
    }

    function updateCorrectionStatus(driftSec){
      const abs = Math.abs(driftSec);

      if(abs < DRIFT_THRESHOLD_SEC){
        if(isSoftCorrecting && abs <= DRIFT_RECOVER_SEC){
          resetPlaybackRate();
          setStatus(`Playing in sync (${formatTrackTime(audio.currentTime)})`);
        }
        return;
      }

      if(driftSec > 0){
        audio.playbackRate = SOFT_RATE_FAST;
        isSoftCorrecting = true;
        setStatus(`Soft catch-up correction (${driftSec.toFixed(2)}s late)`);
      }else{
        audio.playbackRate = SOFT_RATE_SLOW;
        isSoftCorrecting = true;
        setStatus(`Soft slow-down correction (${Math.abs(driftSec).toFixed(2)}s early)`);
      }
    }

    function beginDriftMonitor(){
      clearDriftMonitor();

      driftInterval = setInterval(()=>{
        if(audio.paused || audio.ended) return;
        if(scheduledAnchorMs == null) return;

        const expected = getExpectedTrackTimeSec();
        if(expected == null) return;

        const driftSec = expected - audio.currentTime;
        updateCorrectionStatus(driftSec);
      }, DRIFT_CHECK_MS);
    }

    async function startPlaybackAtCurrentCorrectOffset(){
      if(scheduledAnchorMs == null){
        throw new Error("No scheduled anchor");
      }

      await ensureMetadata();

      const offsetSec = Math.max(0, (Date.now() - scheduledAnchorMs) / 1000);

      if(!hasEnoughToStartAt(offsetSec)){
        setStatus("Still buffering for start…");
        setDebug(`Need more buffer at ${formatTrackTime(offsetSec)}.`);
        return false;
      }

      audio.pause();
      resetPlaybackRate();

      audio.currentTime = offsetSec;
      await waitForSeek();

      audio.muted = false;
      showPlayer();
      await audio.play();

      playbackHasBegun = true;
      waitingForManualStart = false;
      hideStartNow();
      setCountdown("");
      setStatus(`Playing from ${formatTrackTime(audio.currentTime)}`);
      setDebug("");
      beginDriftMonitor();
      return true;
    }

    async function tryAutomaticStart(){
      autoStartAttempted = true;

      try{
        const started = await startPlaybackAtCurrentCorrectOffset();
        if(!started){
          showStartNow();
        }
      }catch(err){
        waitingForManualStart = true;
        showStartNow();
        setStatus("Tap Start Now");
        setDebug(`Automatic start was blocked: ${err.message}`);
      }
    }

    function beginCountdown(startTimeMs){
      clearTimers();

      function update(){
        const remaining = startTimeMs - Date.now();

        if(remaining <= 0){
          clearTimers();
          setCountdown("Starting now");
          tryAutomaticStart();
          return;
        }

        setCountdown(`Starting in ${formatCountdown(remaining)}`);
        setStatus("Downloading / buffering…");
      }

      update();

      countdownInterval = setInterval(update, 250);

      countdownTimer = setTimeout(()=>{
        clearTimers();
        setCountdown("Starting now");
        tryAutomaticStart();
      }, Math.max(0, startTimeMs - Date.now()));
    }

    async function handlePrepare(){
      clearTimers();
      clearDriftMonitor();
      resetPlaybackRate();
      hideStartNow();
      waitingForManualStart = false;
      playbackHasBegun = false;
      autoStartAttempted = false;
      setDebug("");

      if(!startInput.value){
        setStatus("Enter a start time");
        return;
      }

      if(!AUDIO_URL.startsWith("http")){
        setStatus("Add your audio URL first");
        return;
      }

      playButton.disabled = true;

      try{
        preparationStarted = true;
        hidePlayer();
        startDownload();
        setStatus("Connecting to audio…");

        await ensureMetadata();
        updateDownloadProgress();

        const startTimeMs = new Date(startInput.value).getTime();
        const offsetSec = (Date.now() - startTimeMs) / 1000;

        scheduledAnchorMs = startTimeMs;

        if(offsetSec < 0){
          beginCountdown(startTimeMs);
          setStatus("Downloading / buffering…");
          setDebug("Prepared for scheduled start.");
        }else{
          setCountdown("");
          setStatus("Tap Start Now");
          waitingForManualStart = true;
          showStartNow();
          setDebug("Start time is already in the past; manual start will jump to the correct offset.");
        }
      }catch(err){
        setStatus("Audio source did not load");
        setDebug(`Load failed: ${err.message}`);
      }finally{
        playButton.disabled = false;
      }
    }

    async function handleManualStart(){
      if(scheduledAnchorMs == null){
        setStatus("Load / Prepare first");
        return;
      }

      startNowButton.disabled = true;

      try{
        const started = await startPlaybackAtCurrentCorrectOffset();
        if(!started){
          showStartNow();
        }
      }catch(err){
        setStatus("Start failed");
        setDebug(`Manual start failed: ${err.message}`);
        showStartNow();
      }finally{
        startNowButton.disabled = false;
      }
    }

    playButton.addEventListener("click", handlePrepare);
    startNowButton.addEventListener("click", handleManualStart);

    audio.addEventListener("loadedmetadata", ()=>{
      updateDownloadProgress();
      setDebug("Metadata loaded.");
    });

    audio.addEventListener("progress", async ()=>{
      updateDownloadProgress();

      if(waitingForManualStart && scheduledAnchorMs != null){
        const offsetSec = Math.max(0, (Date.now() - scheduledAnchorMs) / 1000);
        if(hasEnoughToStartAt(offsetSec)){
          setStatus("Ready — tap Start Now");
        }
      }
    });

    audio.addEventListener("canplay", ()=>{
      updateDownloadProgress();

      if(waitingForManualStart && scheduledAnchorMs != null){
        const offsetSec = Math.max(0, (Date.now() - scheduledAnchorMs) / 1000);
        if(hasEnoughToStartAt(offsetSec)){
          setStatus("Ready — tap Start Now");
        }
      }
    });

    audio.addEventListener("canplaythrough", ()=>{
      progressBar.value = 1;
      setProgressLabel("Buffered: 100%");
    });

    audio.addEventListener("waiting", ()=>{
      if(!audio.ended && !audio.paused){
        setStatus("Buffering…");
      }
    });

    audio.addEventListener("playing", ()=>{
      if(!isSoftCorrecting){
        setStatus(`Playing (${formatTrackTime(audio.currentTime)})`);
      }
    });

    audio.addEventListener("ended", ()=>{
      clearTimers();
      clearDriftMonitor();
      resetPlaybackRate();
      waitingForManualStart = false;
      playbackHasBegun = false;
      setCountdown("");
      setStatus("Playback ended");
      setDebug("");
      showPlayer();
    });

    audio.addEventListener("error", ()=>{
      setStatus("Audio failed to load");
      setDebug("Check custom domain, public bucket, CORS, and direct MP3 URL.");
    });
  </script>
</body>
</html>
