<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRIME (Heather Christian)</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#111;
      color:#fff;
      font-family:'Inter', system-ui, sans-serif;
    }

    .container{
      width:min(90vw,420px);
      display:grid;
      gap:16px;
      text-align:center;
    }

    /* HEADER GROUP */

    .header{
      display:grid;
      gap:6px;
      margin-bottom:28px;  /* ← separation */
    }

    h1{
      margin:0;
      font-size:1.9rem;
      letter-spacing:.06em;
      font-weight:600;
    }

    .subtitle{
      font-size:.9rem;
      color:#aaa;
      letter-spacing:.04em;
    }

    label{
      font-size:.95rem;
    }

    input, button{
      font-size:1rem;
      padding:12px;
      border-radius:8px;
      border:none;
    }

    input{
      background:#222;
      color:#fff;
    }

    button{
      background:#fff;
      color:#111;
      font-weight:600;
      cursor:pointer;
      min-width:140px;
      justify-self:center;
    }

    button:disabled{
      cursor:default;
    }

    .startNow{
      font-size:1.15rem;
      padding:16px;
    }

    .status{
      min-height:1.4em;
      color:#bbb;
    }

    .countdown{
      min-height:1.4em;
      font-size:1.2rem;
      font-weight:600;
    }

    .transport{
      min-height:1.4em;
      font-size:1rem;
      color:#fff;
      font-variant-numeric:tabular-nums;
    }

    .debug{
      font-size:.82rem;
      color:#777;
      min-height:1.2em;
      word-break:break-word;
    }

    .hidden{
      display:none;
    }

    audio{
      width:100%;
    }

    input[type="datetime-local"]{
      color:#fff;
      background:#222;
    }

    input[type="datetime-local"]::-webkit-datetime-edit{
      color:#fff;
    }

    input[type="datetime-local"]::-webkit-calendar-picker-indicator{
      filter:invert(1);
    }
  </style>
</head>

<body>
  <main class="container">

    <div class="header">
      <h1>PRIME</h1>
      <div class="subtitle">Heather Christian</div>
    </div>

    <label for="startTime">Start Time</label>
    <input id="startTime" type="datetime-local" step="1" />

    <button id="playButton">Begin</button>
    <button id="startNowButton" class="startNow hidden">Begin</button>

    <div id="countdown" class="countdown"></div>
    <div id="status" class="status">Ready.</div>
    <div id="transport" class="transport">00:00 / 00:00</div>

    <div id="debug" class="debug"></div>

    <audio
      id="audio"
      preload="none"
      playsinline
      class="hidden">
    </audio>

  </main>

  <!-- (SCRIPT UNCHANGED — KEEP YOUR CURRENT VERSION HERE) -->

</body>
</html>
